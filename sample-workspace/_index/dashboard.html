<style>

const CARDS = [{"id":"SC-ACME-CLOUD-0001","title":"Get written landing-zone sign-off from Northwind","status":"WAIT","priority":"high","type":"blocker","late":true,"urgent":true,"assignee":"vendor / Amir Haddad","reporter":"internal / Sarah Chen","deadline":"2026-05-29","deadline_text":"needed before the first cutover can be scheduled","project":"ACME/CLOUD","file":"projects/ACME/cloud-migration/cards/SC-ACME-CLOUD-0001.json","body":"## Context\n\nThe first application cutover (OrderHub) cannot be scheduled until Northwind has signed off on the landing-zone design in writing. The sign-off confirms the networking, identity, and backup configuration we will be cutting over into.\n\n## Rationale\n\nA verbal \"looks good\" is not enough to commit a maintenance window to the sponsor. If we schedule the cutover and the landing zone changes underneath us, the runbook is invalid and we burn the window.\n\n## Open questions\n\n- Does the backup configuration meet Acme's 30-day retention requirement, or is that the thing still under review on Northwind's side?\n\n## Next step\n\nHold the vendor to 2026-06-04. If it slips again, escalate to Mark with the contract-backstop date attached.\n","log":[{"ts":"2026-05-12T09:00:00Z","who":"SC","action":"created","note":"Raised after the kickoff; sign-off is the gating item for cutover 1."},{"ts":"2026-05-20T11:15:00Z","who":"SC","action":"status","from":"TODO","to":"WAIT","note":"Handed to Amir; waiting on Northwind internal review."},{"ts":"2026-05-29T16:20:00Z","who":"SC","note":"Verbal OK on the sync, no written sign-off. New date 2026-06-04."}],"sources":[{"type":"meeting","ref":"MTG-ACME-CLOUD-2026-05-26-01","note":"raised at the weekly vendor sync"},{"type":"issue","ref":"ACLD-118","note":"vendor ticket for the sign-off"}],"acceptance_criteria":["Landing-zone design document signed off by Northwind in writing","Sign-off references the agreed networking and backup configuration"],"tags":["vendor","gating"],"created":"2026-05-12T09:00:00Z","updated":"2026-05-29T16:20:00Z","latest_update":{"date":"2026-05-29","by":"Amir Haddad (Northwind)","summary":"Verbal 'looks good' on the sync, but **no written sign-off yet**. Amir says the backup config needs one more internal review on their side.\n- New promised date: 2026-06-04\n- This is now past its own deadline — first cutover (0002) cannot be scheduled until it lands"}},{"id":"SC-ACME-CLOUD-0002","title":"Write the OrderHub cutover runbook + rollback","status":"PLAN","priority":"medium","type":"task","late":false,"urgent":false,"assignee":"internal / Sarah Chen","reporter":"internal / Sarah Chen","deadline":"2026-06-20","deadline_text":"draft ready for vendor review two weeks before cutover","project":"ACME/CLOUD","file":"projects/ACME/cloud-migration/cards/SC-ACME-CLOUD-0002.json","body":"## Context\n\nOrderHub is the first and riskiest of the three cutovers — it feeds Billing downstream. The runbook has to make the cutover boring: every step owned, every step timed, and a rollback that fits inside the window.\n\n## Rationale\n\nWe only get one maintenance window per application without sponsor pain. A rehearsed runbook is how we spend that window on execution instead of discovery.\n\n## Open questions\n\n- Can the rollback reuse the on-prem host as-is, or do we need a frozen snapshot taken at the start of the window?\n\n## Next step\n\nBlocked on [[SC-ACME-CLOUD-0001]] — start drafting the skeleton now, finalize once the landing zone is signed off.\n","log":[{"ts":"2026-05-12T09:05:00Z","who":"SC","action":"created","note":"First cutover runbook; depends on landing-zone sign-off."},{"ts":"2026-05-20T11:16:00Z","who":"SC","action":"status","from":"TODO","to":"PLAN","note":"Scheduled for after 0001 clears."}],"sources":[{"type":"doc","ref":"ACLD/445522","note":"migration approach page"}],"acceptance_criteria":["Step-by-step cutover sequence with owners and timings","Tested rollback path that fits inside the maintenance window","Reviewed by Northwind"],"tags":["runbook","cutover"],"created":"2026-05-12T09:05:00Z","updated":"2026-05-20T11:16:00Z","latest_update":null},{"id":"SC-ACME-CLOUD-0003","title":"Decide: phased cutover vs all-three-in-one-weekend","status":"TODO","priority":"high","type":"decision","late":false,"urgent":true,"assignee":"internal / Sarah Chen","reporter":"customer / Mark Thompson","deadline":"2026-06-10","deadline_text":"decision needed at the next steering","project":"ACME/CLOUD","file":"projects/ACME/cloud-migration/cards/SC-ACME-CLOUD-0003.json","body":"## Context\n\nMark (sponsor) wants the three cutovers compressed into one weekend so the business takes a single disruption hit. The delivery team believes a phased approach — OrderHub first, a soak period, then Billing and Reporting — is materially safer because OrderHub feeds Billing.\n\n## Rationale\n\nThis is a decision-card, not a task-card: the deliverable is a *decision*, recorded with the decision-maker named. The job here is to frame the trade-off cleanly enough that Mark can choose with his eyes open, not to win the argument.\n\n## Open questions\n\n- What is the real cost to Acme of two maintenance weekends vs one? (If it is small, phased wins easily.)\n- Does the rollback story get harder in a single-weekend cutover because three rollbacks would contend for the same window?\n\n## Next step\n\nDraft the one-paragraph recommendation. Bring it to the 2026-06-10 steering and record the outcome on that meeting-card.\n","log":[{"ts":"2026-05-22T13:30:00Z","who":"SC","action":"created","note":"Cutover-strategy decision raised by the sponsor."},{"ts":"2026-05-26T15:00:00Z","who":"SC","note":"Sponsor restated preference for one weekend at the vendor sync."}],"sources":[{"type":"meeting","ref":"MTG-ACME-CLOUD-2026-05-26-01","note":"sponsor pushed for one weekend"}],"acceptance_criteria":["Recommendation written with the risk trade-off stated in one paragraph","Decision recorded on the steering meeting-card with the decision-maker named"],"tags":["steering","cutover"],"created":"2026-05-22T13:30:00Z","updated":"2026-05-22T13:30:00Z","latest_update":{"date":"2026-05-26","by":"Sarah Chen","summary":"Mark wants all three apps cut over in a single weekend to minimize business disruption. Team's instinct is phased (OrderHub first, soak, then Billing + Reporting). Need a written recommendation before the 2026-06-10 steering."}},{"id":"SC-ACME-CLOUD-0004","title":"Watch the data-center decommission backstop (contract auto-renews 2026-12-31)","status":"DOING","priority":"medium","type":"monitoring","late":false,"urgent":false,"assignee":"internal / Sarah Chen","reporter":"internal / Sarah Chen","deadline":null,"deadline_text":"ongoing — hard backstop 2026-12-31","project":"ACME/CLOUD","file":"projects/ACME/cloud-migration/cards/SC-ACME-CLOUD-0004.json","body":"## Context\n\nThe data-center contract renews automatically for another 12 months on 2026-12-31 unless the on-prem hosts are decommissioned and termination is confirmed before then. This is the hard outer deadline the whole project hangs from.\n\n## Rationale\n\nA monitoring-card has no single \"done\" moment until the very end — its job is to keep a slow-moving deadline visible so it never becomes a surprise. It stays in DOING and gets revisited, not closed and reopened.\n\n## Next step\n\nRecompute the latest-safe cutover dates whenever the schedule moves. If the last cutover + 30-day soak no longer clears 2026-12-31, raise the alarm immediately.\n","log":[{"ts":"2026-02-20T10:00:00Z","who":"SC","action":"created","note":"Backstop tracker created at project start."},{"ts":"2026-05-20T11:20:00Z","who":"SC","note":"Still 6+ weeks of slack against the backstop; healthy for now."}],"sources":[],"acceptance_criteria":["On-prem hosts decommissioned and contract termination confirmed before 2026-12-31"],"tags":["contract","backstop"],"created":"2026-02-20T10:00:00Z","updated":"2026-05-20T11:20:00Z","latest_update":null},{"id":"SC-ACME-CLOUD-0006","title":"Investigate Billing batch timeout in the Northwind test env","status":"DOING","priority":"medium","type":"task","late":false,"urgent":false,"assignee":"internal / Sarah Chen","reporter":"internal / Sarah Chen","deadline":"2026-06-12","deadline_text":"before Billing cutover planning can proceed","project":"ACME/CLOUD","file":"projects/ACME/cloud-migration/cards/SC-ACME-CLOUD-0006.json","body":"## Context\n\nThe Billing nightly batch timed out in the Northwind test environment during the first dry-run (see issue [[ISS-ACME-CLOUD-0001]]) — >2h versus ~35 min on-prem on the same dataset. Billing cannot be scheduled for cutover until this is understood.\n\n## Rationale\n\nThis is the work that follows from the issue. The issue records *what's wrong*; this card drives *fixing it*. Keeping them separate means the issue can stay open until verified even after the investigation card is done.\n\n## Open questions\n\n- Is it the storage tier (IOPS), a missing index after migration, or a batch-window scheduling difference on Northwind?\n\n## Next step\n\nProfile the batch in the test env; compare query plans against on-prem. Report findings back onto the issue.\n","log":[{"ts":"2026-05-28T10:00:00Z","who":"SC","action":"created","note":"Spawned from issue ISS-ACME-CLOUD-0001 (Billing batch timeout)."},{"ts":"2026-05-28T10:01:00Z","who":"SC","action":"status","from":"TODO","to":"DOING","note":"Started profiling in the test env."}],"sources":[{"type":"issue","ref":"ISS-ACME-CLOUD-0001","note":"the issue this action follows from"}],"acceptance_criteria":["Root cause of the >2h batch runtime identified","A fix or mitigation proposed and validated in the test env"],"tags":["billing","performance"],"created":"2026-05-28T10:00:00Z","updated":"2026-05-28T10:00:00Z","latest_update":null}];

const REGISTER = {"risks":[{"id":"RISK-ACME-CLOUD-001","project_id":"ACME-CLOUD","title":"Vendor landing-zone sign-off slips, delaying the first cutover","status":"mitigating","file":"projects/ACME/cloud-migration/risks/RISK-ACME-CLOUD-001.json","probability":"high","impact":"high","score":16,"response":"mitigate","raised":"2026-05-20"}],"deliverables":[{"id":"DLV-ACME-CLOUD-001","project_id":"ACME-CLOUD","title":"OrderHub cutover runbook (signed off)","status":"in-progress","file":"projects/ACME/cloud-migration/deliverables/DLV-ACME-CLOUD-001.json","baseline_date":"2026-06-20","due_date":"2026-06-20","milestone_id":"MS-ACME-CLOUD-001"}],"milestones":[{"id":"MS-ACME-CLOUD-001","project_id":"ACME-CLOUD","title":"OrderHub live on Northwind","status":"at-risk","file":"projects/ACME/cloud-migration/milestones/MS-ACME-CLOUD-001.json","target_date":"2026-09-15","baseline_date":"2026-09-01","actual_date":null,"gate":true}],"decisions":[{"id":"DEC-ACME-CLOUD-001","project_id":"ACME-CLOUD","title":"Phased cutover over single-weekend big-bang","status":"proposed","file":"projects/ACME/cloud-migration/decisions/DEC-ACME-CLOUD-001.json","date":"2026-06-02"}],"issues":[{"id":"ISS-ACME-CLOUD-0001","project_id":"ACME-CLOUD","title":"Billing nightly batch times out in the Northwind test environment","status":"in-progress","file":"projects/ACME/cloud-migration/issues/ISS-ACME-CLOUD-0001.json","severity":"high","priority":"medium","type":"defect","resolution":null,"raised":"2026-05-28","resolved":null}]};

document.getElementById('meta-info').innerHTML = 'dinsdag 2 juni 2026';

function projectIdFromCard(c) { return c.project ? c.project.replace('/', '-') : null; }
function classify(c) {
  if (c.urgent || c.late) return 'urgent';
  if (['WAIT', 'PLAN', 'BLOCKED'].includes(c.status)) return 'wait';
  return 'normal';
}
function escapeHtml(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[ch])); }
function escapeAttr(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch])); }
function projectDirOf(card) {
  if (!card || !card.file) return null;
  return card.file.replace(/\\/g, '/').replace(/\/cards\/[^/]+$/, '');
}
function refLooksLikeFile(ref) {
  if (!ref) return false;
  if (/^https?:\/\//i.test(ref)) return false;
  return /^(input|cards|output|review|kennis|docs|meetings|notes|drafts)\//i.test(ref);
}
function renderSourceRef(s, card) {
  const ref = s.ref || '';
  const type = (s.type || '').toLowerCase();
  let href = null;
  if (/^https?:\/\//i.test(ref)) { href = ref; }
  else if (type === 'issue' && ISSUE_BASE) { const m = ref.match(/^([A-Z][A-Z0-9]+-\d+)/); if (m) href = ISSUE_BASE + '/browse/' + m[1]; }
  else if (type === 'doc' && WIKI_BASE) { const m = ref.match(/^([A-Z][A-Z0-9]+)\/(\d+)/); if (m) href = WIKI_BASE + '/wiki/spaces/' + m[1] + '/pages/' + m[2]; }
  if (!href && refLooksLikeFile(ref)) { const pd = projectDirOf(card); if (pd) href = '../' + pd + '/' + ref; }
  if (href) { return '<a href="' + escapeAttr(href) + '" target="_blank" rel="noopener" class="ref-link">' + escapeHtml(ref) + '</a>'; }
  return '<span class="ref">' + escapeHtml(ref) + '</span>';
}
function shortName(s, max=28) { if (!s) return ''; const tail = s.split(' / ').pop(); return tail.length > max ? tail.slice(0, max-1) + '…' : tail; }
function sortCards(cards) {
  return [...cards].sort((a, b) => {
    if (a.urgent !== b.urgent) return b.urgent - a.urgent;
    const da = a.deadline || '9999-12-31'; const db = b.deadline || '9999-12-31';
    if (da !== db) return da.localeCompare(db);
    return a.id.localeCompare(b.id);
  });
}
function renderProjectGrid() {
  const active = PROJECTS_META.filter(p => !['done','cancelled'].includes(p.status));
  const counts = {};
  for (const p of active) counts[p.id] = { urgent: 0, normal: 0, wait: 0, total: 0 };
  for (const c of CARDS) { const pid = projectIdFromCard(c); if (!counts[pid]) continue; counts[pid][classify(c)]++; counts[pid].total++; }
  active.sort((a, b) => (counts[b.id].urgent - counts[a.id].urgent) || (counts[b.id].total - counts[a.id].total));
  document.getElementById('project-grid').innerHTML = active.map(p => {
    const c = counts[p.id];
    return `
      <div class="project-card" onclick="showProject('${p.id}')">
        <div class="arrow">&rarr;</div>
        <h2>${escapeHtml(p.title)}</h2>
        <div class="customer">${escapeHtml(p.customer || p.id)}</div>
        <div class="stats">
          <div class="stat stat-urgent"><div class="n">${c.urgent}</div><div class="lbl">Urgent</div></div>
          <div class="stat stat-normal"><div class="n">${c.normal}</div><div class="lbl">Normal</div></div>
          <div class="stat stat-wait"><div class="n">${c.wait}</div><div class="lbl">Waiting</div></div>
        </div>
      </div>`;
  }).join('') || '<div class="col-empty" style="color:var(--text-on-dark-faint)">No active projects with open cards yet.</div>';
}
function renderCard(c) {
  const flags = [];
  if (c.urgent) flags.push('🔥');
  if (c.late) flags.push('⚠');
  const deadlineHtml = c.deadline ? `<span class="deadline ${c.late ? 'late' : ''}">${c.deadline}</span>` : '';
  const eigHtml = c.assignee ? `<span>👤 ${escapeHtml(shortName(c.assignee))}</span>` : '';
  return `
    <div class="card" onclick="openCard('${c.id}')">
      <div class="id">${c.id}</div>
      <div class="title">${escapeHtml(c.title)}</div>
      <div class="meta">${deadlineHtml}${eigHtml}<span class="status">${c.status}</span>${flags.length ? `<span class="flags">${flags.join(' ')}</span>` : ''}</div>
    </div>`;
}
function renderRegister(pid) {
  const el = document.getElementById('register');
  const groups = [
    { label: 'Risks',        items: (REGISTER.risks        || []).filter(x => x.project_id === pid), meta: r => [ (r.probability && r.impact) ? `${r.probability}×${r.impact}` : '', (r.score != null) ? 'score ' + r.score : '', r.response ].filter(Boolean).join(' · ') },
    { label: 'Issues',       items: (REGISTER.issues       || []).filter(x => x.project_id === pid), meta: r => [ r.severity ? 'sev ' + r.severity : '', r.priority ? 'prio ' + r.priority : '', r.type ].filter(Boolean).join(' · ') },
    { label: 'Decisions',    items: (REGISTER.decisions    || []).filter(x => x.project_id === pid), meta: r => [ r.date ].filter(Boolean).join(' · ') },
    { label: 'Milestones',   items: (REGISTER.milestones   || []).filter(x => x.project_id === pid), meta: r => [ r.target_date ? 'target ' + r.target_date : '', (r.gate === true) ? 'gate' : '' ].filter(Boolean).join(' · ') },
    { label: 'Deliverables', items: (REGISTER.deliverables || []).filter(x => x.project_id === pid), meta: r => [ r.due_date ? 'due ' + r.due_date : '' ].filter(Boolean).join(' · ') }
  ].filter(g => g.items.length);
  if (!groups.length) { el.classList.add('hidden'); el.innerHTML = ''; return; }
  el.classList.remove('hidden');
  el.innerHTML = '<h3 class="register-title">Project register</h3><div class="reg-grid">' + groups.map(g => `
    <div class="reg-group"><h4>${g.label}<span class="cnt">${g.items.length}</span></h4>
      ${g.items.map(it => { const m = g.meta(it); return `<div class="reg-item"><div class="rid">${escapeHtml(it.id)}</div><div class="rtitle">${escapeHtml(it.title || '')}</div><div class="rmeta"><span class="rstatus">${escapeHtml(it.status || '')}</span>${m ? `<span>${escapeHtml(m)}</span>` : ''}</div></div>`; }).join('')}
    </div>`).join('') + '</div>';
}

function showProject(pid) {
  const project = PROJECTS_META.find(p => p.id === pid);
  if (!project) return;
  document.getElementById('detail-title').textContent = project.title;
  document.getElementById('detail-customer').textContent = project.customer || pid;
  const my = CARDS.filter(c => projectIdFromCard(c) === pid);
  const buckets = { urgent: [], normal: [], wait: [] };
  for (const c of my) buckets[classify(c)].push(c);
  for (const k of Object.keys(buckets)) buckets[k] = sortCards(buckets[k]);
  const rc = (id, list, empty) => {
    const el = document.getElementById(id);
    if (list.length === 0) el.innerHTML = `<div class="col-empty">${empty}</div>`;
    else el.innerHTML = list.map((c, i) => renderCard(c).replace('<div class="card"', `<div class="card" style="animation-delay:${i*30}ms"`)).join('');
  };
  rc('col-urgent', buckets.urgent, 'Nothing urgent — keep it that way 🎯');
  rc('col-normal', buckets.normal, 'Nothing in progress');
  rc('col-wait',   buckets.wait,   'Nothing in the waiting room');
  document.getElementById('count-urgent').textContent = buckets.urgent.length;
  document.getElementById('count-normal').textContent = buckets.normal.length;
  document.getElementById('count-wait').textContent = buckets.wait.length;
  renderRegister(pid);
  document.getElementById('view-grid').classList.add('hidden');
  document.getElementById('view-detail').classList.remove('hidden');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
function showGrid() {
  document.getElementById('view-detail').classList.add('hidden');
  document.getElementById('view-grid').classList.remove('hidden');
  document.getElementById('view-grid').style.animation = 'none';
  void document.getElementById('view-grid').offsetWidth;
  document.getElementById('view-grid').style.animation = '';
}
function renderBodyMd(md) {
  if (!md) return '<em>no description</em>';
  let html = escapeHtml(md);
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
  html = html.replace(/(<li>.+<\/li>\n?)+/g, m => '<ul>' + m + '</ul>');
  html = html.replace(/\[\[(.+?)\]\]/g, '<code>$1</code>');
  return html;
}
function openCard(id) {
  const c = CARDS.find(x => x.id === id);
  if (!c) return;
  const badges = [];
  badges.push(`<span class="badge badge-status">${c.status}</span>`);
  if (c.priority) badges.push(`<span class="badge badge-priority-${c.priority}">${c.priority}</span>`);
  if (c.urgent) badges.push(`<span class="badge badge-urgent">urgent</span>`);
  if (c.late) badges.push(`<span class="badge badge-late">late</span>`);
  if (c.type) badges.push(`<span class="badge">${c.type}</span>`);
  const dl = c.deadline ? `<span class="${c.late ? 'val late' : 'val'}">${c.deadline}${c.deadline_text ? ' — ' + escapeHtml(c.deadline_text) : ''}</span>` : '<span class="val">—</span>';
  const grid = `
    <div class="modal-grid">
      <div class="lbl">Project</div><div class="val">${escapeHtml(c.project || '—')}</div>
      <div class="lbl">Assignee</div><div class="val">${escapeHtml(c.assignee || '—')}</div>
      <div class="lbl">Reporter</div><div class="val">${escapeHtml(c.reporter || '—')}</div>
      <div class="lbl">Deadline</div>${dl}
      <div class="lbl">Created</div><div class="val">${escapeHtml((c.created || '—').slice(0,10))}</div>
      <div class="lbl">Updated</div><div class="val">${escapeHtml((c.updated || '—').slice(0,10))}</div>
    </div>`;
  const tags = (c.tags || []).length ? `<div class="modal-section"><h3>Tags</h3>${c.tags.map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('')}</div>` : '';
  const ac = (c.acceptance_criteria || []).length ? `<div class="modal-section"><h3>Acceptance criteria</h3><ul>${c.acceptance_criteria.map(x => `<li>${escapeHtml(x)}</li>`).join('')}</ul></div>` : '';
  const sources = (c.sources || []).length ? `<div class="modal-section"><h3>Sources</h3>${c.sources.map(s => `
        <div class="source"><span class="type">${escapeHtml(s.type || '?')}</span>${renderSourceRef(s, c)}${s.note ? `<span class="note">${escapeHtml(s.note)}</span>` : ''}</div>`).join('')}</div>` : '';
  const lu = c.latest_update;
  const latestUpdateHtml = (lu && lu.summary) ? `<div class="latest-update">
        <div class="lu-head"><strong>Latest update</strong>${lu.date ? `<span class="lu-date">${escapeHtml(lu.date)}</span>` : ''}${lu.by ? `<span class="lu-by">— ${escapeHtml(lu.by)}</span>` : ''}</div>
        <div class="lu-body">${renderBodyMd(lu.summary)}</div></div>` : '';
  const body = c.body ? `<div class="modal-section"><h3>Description</h3><div class="body-md">${renderBodyMd(c.body)}</div></div>` : '';
  const log = (c.log || []).length ? `<div class="modal-section"><h3>Activity log (${c.log.length})</h3>${[...c.log].reverse().map(e => `
        <div class="log-entry"><span class="ts">${escapeHtml((e.ts || '').slice(0, 16).replace('T',' '))}</span><span class="who">${escapeHtml(e.who || '?')}</span>${e.action ? `<span class="action">${escapeHtml(e.action)}</span>` : ''}${e.note ? escapeHtml(e.note) : ''}${e.from ? ` (${escapeHtml(e.from)} → ${escapeHtml(e.to || '')})` : ''}</div>`).join('')}</div>` : '';
  document.getElementById('modal').innerHTML = `
    <div class="modal-header">
      <button class="modal-close" onclick="closeModal()">&times;</button>
      <div class="modal-id">${c.id}</div>
      <h2 class="modal-title">${escapeHtml(c.title)}</h2>
      <div class="modal-badges">${badges.join('')}</div>
    </div>
    <div class="modal-body">${grid}${latestUpdateHtml}${body}${ac}${tags}${sources}${log}</div>`;
  document.getElementById('overlay').classList.remove('hidden');
  document.body.style.overflow = 'hidden';
}
function closeModal() { document.getElementById('overlay').classList.add('hidden'); document.body.style.overflow = ''; }
renderProjectGrid();

  if (e.key === 'Escape') {
